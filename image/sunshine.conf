# Sunshine: wlroots screencopy capture + VAAPI hardware encode.

# Hardware encoder on the render node (never card0):
encoder = vaapi
adapter_name = /dev/dri/renderD128

# Capture via wlroots (avoids KMS grab, which would require CAP_SYS_ADMIN):
capture = wlr
output_name = HEADLESS-1

# If HEVC shows a green bar / size mismatch (known AMD ffmpeg bug), force H.264:
# hevc_mode = 0

min_log_level = info
